name: main

on:
  push:
    branches: master
  pull_request:

jobs:
  main:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
        #- 14
        #- 16
        - 18
        - 20
        - 22
        #- 24
    services:
      postgres:
        image: postgres:12
        env:
          POSTGRES_PASSWORD: odktest
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 1s
          --health-timeout 5s
          --health-retries 50
    steps:
    - uses: actions/checkout@v6
    - run: corepack enable
    - uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'yarn'
    - name: Cache node modules & native builds
      uses: actions/cache@v6
      with:
        path: |
          node_modules
          ~/.cache/node-gyp
        key: ${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('**/yarn.lock') }}
        restore-keys: |
          ${{ runner.os }}-node-${{ matrix.node-version }}-
    # TODO Should be:
    #- run: yarn install --immutable
    - run: yarn install
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: yarn-lock-${{ matrix.node-version }}
        path: yarn.lock
    - run: yarn lint
    - run: yarn build
    - run: yarn test
