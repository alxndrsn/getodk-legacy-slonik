name: main

on:
  push:
    branches: master
  pull_request:

jobs:
  main:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
        # Aim to support any version from getodk/central-backend's current version onwards.
        # See: https://github.com/getodk/central-backend/blob/master/package.json
        - 24
        - 26
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_PASSWORD: odktest
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 1s
          --health-timeout 5s
          --health-retries 50
    steps:
    - uses: actions/checkout@v6
    - run: corepack enable
    - uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'yarn'
    - run: yarn install --immutable
    - run: yarn add -D eslint@9 typescript-eslint @typescript-eslint/parser @typescript-eslint/eslint-plugin
    - run: git diff -- package.json
    - uses: actions/upload-artifact@v6
      if: always()
      with:
        name: yarn-lock-${{ matrix.node-version }}
        path: yarn.lock
    - run: yarn lint
    - run: yarn build
    - run: yarn test
