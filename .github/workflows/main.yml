name: main

on:
  push:
    branches: master
  pull_request:

jobs:
  main:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
        # Aim to support any version from getodk/central-backend's current version onwards.
        # See: https://github.com/getodk/central-backend/blob/master/package.json
        - 24
        - 26
    steps:
    - uses: actions/checkout@v6
    - run: ./scripts/start-postgres
    - run: corepack enable
    - uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'yarn'
    - run: yarn install --immutable
    - uses: actions/upload-artifact@v6
      if: always()
      with:
        name: yarn-lock-${{ matrix.node-version }}
        path: yarn.lock
    - run: yarn npm audit --environment production --recursive
    - run: yarn lint
    - run: yarn build
    - run: yarn test:ava
    - run: scripts/git-assert-clean
