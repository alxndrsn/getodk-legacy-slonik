name: main

on:
  push:
    branches: master
  pull_request:

jobs:
  main:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
        #- 14
        #- 16
        - 18
        - 20
        - 22
        #- 24
    services:
      postgres:
        image: postgres:12
        env:
          POSTGRES_PASSWORD: odktest
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 1s
          --health-timeout 5s
          --health-retries 50
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: corepack enable
    # TODO Should be:
    #- run: yarn install --immutable
    - run: yarn install
    - run: yarn lint
    - run: yarn build
    - run: yarn test
